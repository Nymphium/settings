name: Rulesync Merge
on:
  push:
    branches:
      - 'rulesync/**'

permissions:
  contents: write
  pull-requests: write

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Merge all rulesync branches
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout -B rulesync/merged origin/master

          branches=$(git branch -r --list 'origin/rulesync/*' | grep -v 'origin/rulesync/merged' | tr -d ' ')
          if [ -z "$branches" ]; then
            echo "No rulesync branches found."
            exit 0
          fi

          echo "Merging branches:"
          echo "$branches"

          for branch in $branches; do
            echo "--- Merging $branch ---"
            git merge "$branch" --no-edit -m "Merge $branch into rulesync/merged"
          done

          git push -f origin rulesync/merged

          existing_pr=$(gh pr list --base master --head rulesync/merged --json number --jq '.[0].number')
          if [ -n "$existing_pr" ]; then
            echo "PR #$existing_pr already exists, updated by push."
          else
            gh pr create \
              --base master \
              --head rulesync/merged \
              --title "feat(rulesync): merge settings from all PCs" \
              --body "Auto-generated PR merging all \`rulesync/*\` branches."
          fi
