# PowerKit plugin
set -g @plugin 'fabioluciano/tmux-powerkit'

# Basic configuration
set -g @powerkit_plugins "battery,hostname,cpu,memory,ping"
set -g @powerkit_theme "tokyo-night"
set -g @powerkit_status_position "bottom"
set -g @powerkit_status_order "plugins,session"
set -g @powerkit_pane_border_lines "heavy"

set -g @powerkit_theme_variant "storm"
set -g window-active-style 'bg=terminal'

# Dark/light mode auto-switch
# set -g @plugin 'erikw/tmux-dark-notify'
# set -g @dark-notify-theme-path-light '$HOME/.config/tmux/theme-light.conf'
# set -g @dark-notify-theme-path-dark '$HOME/.config/tmux/theme-dark.conf'

# Propagate login shell PATH to run-shell environment
run-shell 'tmux setenv -g PATH "$(zsh -c "echo \$PATH")"'
run-shell "tmux setenv -g TMUX_VERSION $(tmux -V | cut -c 6-)"

# options settings
set -s escape-time 0
set -g history-limit 50000

set -g aggressive-resize on
set -g default-terminal "tmux-256color"
set -as terminal-features ",*:RGB"
set -ga terminal-overrides ",*:Tc"
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'  # undercurl support
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'
set -g focus-events on
set -g mouse on
set -g set-clipboard on

# source keybind
source $HOME/.config/tmux/keybind.conf

# Initialize TPM (keep at bottom)
run '~/.tmux/plugins/tpm/tpm'


# Inject SSH server IP into powerkit status line
run-shell 'fmt=$(tmux show -gv "status-format[0]"); tmux set -g "status-format[0]" "#[fg=#7aa2f7,bg=#292e42,bold]#(~/.config/tmux/ssh-status.sh)#[default]${fmt}"'
